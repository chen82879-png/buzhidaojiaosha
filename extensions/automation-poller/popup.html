<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Automation Poller</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 14px;
        color: #101828;
        font: 13px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }
      label {
        display: block;
        margin: 10px 0 4px;
        color: #475467;
      }
      input[type="text"],
      input[type="password"] {
        box-sizing: border-box;
        width: 100%;
        padding: 8px 9px;
        border: 1px solid #d0d5dd;
        border-radius: 6px;
        background: #fff;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: 12px;
      }
      button {
        padding: 8px 10px;
        border: 0;
        border-radius: 6px;
        color: #fff;
        background: #0f766e;
        cursor: pointer;
      }
      button.secondary {
        color: #344054;
        background: #e4e7ec;
      }
      .status {
        margin-top: 12px;
        padding: 8px;
        border-radius: 6px;
        background: #fff;
        color: #475467;
        word-break: break-all;
      }
      .worker {
        font-size: 12px;
        color: #667085;
      }
    </style>
  </head>
  <body>
    <h1>Automation Poller</h1>
    <label for="baseUrl">Backend URL</label>
    <input id="baseUrl" type="text" />

    <label for="secret">Automation Secret</label>
    <input id="secret" type="password" />

    <div class="row">
      <label><input id="enabled" type="checkbox" /> Enabled</label>
      <span id="worker" class="worker"></span>
    </div>

    <div class="row">
      <button id="save">Save</button>
      <button id="poll" class="secondary">Poll now</button>
    </div>

    <div id="status" class="status">Loading...</div>
    <script src="popup.js"></script>
  </body>
</html>
