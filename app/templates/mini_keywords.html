{% extends "mini_shell.html" %}

{% block page_title %}关键词{% endblock %}

{% block header_action %}
<button class="mini-primary-button" type="submit" form="keyword-form">保存</button>
{% endblock %}

{% block content %}
<form id="keyword-form" class="mini-form-panel" method="post" action="/mini/keywords">
  <div class="mini-card-list">
    {% for keyword in keywords %}
    <div class="mini-keyword-card" data-keyword-card>
      <span class="mini-keyword-main">
        <span>
          <strong>{{ keyword.text }}</strong>
          <em>命中 {{ keyword.hit_count }} · 识别</em>
        </span>
      </span>
      <div class="mini-toggle-row">
        <label class="mini-inline-toggle">
          <input class="wait-keyword-checkbox" type="checkbox"
                 name="stats_enabled::{{ keyword.text }}" value="1"
                 {% if keyword.stats_enabled %}checked{% endif %}>
          <span>统计</span>
        </label>
        <label class="mini-inline-toggle">
          <input class="wait-keyword-checkbox task-toggle" type="checkbox"
                 name="task_enabled::{{ keyword.text }}" value="1"
                 {% if keyword.task_enabled %}checked{% endif %}>
          <span>创建任务</span>
        </label>
        <label class="mini-inline-toggle">
          <input class="wait-keyword-checkbox alert-toggle" type="checkbox"
                 name="alert_enabled::{{ keyword.text }}" value="1"
                 {% if keyword.alert_enabled %}checked{% endif %}>
          <span>超时预警</span>
        </label>
      </div>
      <input
        class="mini-text-input"
        type="text"
        inputmode="text"
        autocomplete="off"
        name="chat_ids::{{ keyword.text }}"
        value="{{ keyword.recipient_chat_ids }}"
        placeholder="接收预警 Chat ID，例如 123456789, -100123"
        aria-label="{{ keyword.text }} 接收预警 Chat ID"
      >
    </div>
    {% endfor %}
  </div>
</form>
<script>
document.querySelectorAll('[data-keyword-card]').forEach((card) => {
  const task = card.querySelector('.task-toggle');
  const alert = card.querySelector('.alert-toggle');
  alert.addEventListener('change', () => {
    if (alert.checked) task.checked = true;
  });
  task.addEventListener('change', () => {
    if (!task.checked) alert.checked = false;
  });
});
</script>
{% endblock %}
